<title>GAM – Enrichment Workspace Prototype</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:14px;color:#1e293b;background:#f1f5f9;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
@keyframes fi{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

.app{display:flex;height:100vh}

/* Sidebar */
.sb{width:232px;background:#1a365d;color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sb-hdr{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-hdr h2{font-size:1.02em;font-weight:700;letter-spacing:.03em;margin:0}
.sb-hdr small{font-size:.7em;color:#94a3b8}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0}
.sb-section{padding:10px 18px 5px;font-size:.66em;font-weight:700;color:#64748b;letter-spacing:.08em}
.sb-item{display:flex;align-items:center;gap:9px;width:100%;padding:8px 18px;border:none;background:transparent;color:#cbd5e1;cursor:pointer;font-size:.84em;text-align:left;border-left:3px solid transparent;transition:all .15s;font-family:inherit}
.sb-item:hover{background:rgba(255,255,255,.06)}
.sb-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#6ee7b7}
.sb-item .ic{width:18px;text-align:center}
.sb-item .lb{flex:1}
.sb-badge{background:rgba(255,255,255,.15);padding:1px 7px;border-radius:10px;font-size:.76em;font-weight:600}
.sb-footer{padding:10px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:.73em;color:#64748b}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{padding:10px 22px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.top-bar h1{font-size:1.05em;font-weight:700;margin:0}
.top-bar .meta{font-size:.76em;color:#94a3b8}
.stm-filter{font-size:.78em;color:#64748b}
.stm-filter a{color:#3b82f6;cursor:pointer;text-decoration:underline;border:none;background:none;font-size:inherit;font-family:inherit}
.content{flex:1;overflow:auto}

/* Summary panel */
.summary{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 22px}
.summary-title{font-size:.78em;font-weight:700;color:#64748b;margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.summary-hint{margin-top:6px;font-size:.74em;color:#94a3b8;font-style:italic}

/* Toolbar */
.toolbar{padding:9px 22px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.toolbar .sep{width:1px;height:22px;background:#e2e8f0}
.toolbar .spacer{flex:1}
.sel-info{font-size:.76em;color:#64748b;padding:3px 9px;background:#f1f5f9;border-radius:4px}

/* Filters */
.filters{padding:7px 22px;background:#fafbfc;border-bottom:1px solid #f1f5f9;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filters label{font-size:.73em;color:#94a3b8;font-weight:600}
.filters select,.filters input{font-size:.8em;padding:3px 7px;border:1px solid #e2e8f0;border-radius:4px;font-family:inherit}
.filters input{width:130px}

/* Tables */
table{width:100%;border-collapse:collapse}
th{padding:7px 9px;font-size:.72em;color:#64748b;border-bottom:2px solid #e2e8f0;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;background:#f8fafc;z-index:1}
td{padding:6px 9px;font-size:.85em;border-bottom:1px solid #f1f5f9}
.r{text-align:right}
.c{text-align:center}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:#fafbfc}

/* Badges */
.st-badge{padding:2px 10px;border-radius:12px;font-size:.79em;font-weight:500;white-space:nowrap;display:inline-block}
.st-badge.bold{font-weight:700}
.st-badge.strike{text-decoration:line-through}
.conf-badge{padding:2px 8px;border-radius:8px;font-size:.75em;font-weight:500;white-space:nowrap;display:inline-block}
.origin-badge{padding:2px 8px;border-radius:8px;font-size:.75em;font-weight:600;display:inline-block}
.src-badge{font-weight:600;font-size:.8em;padding:1px 6px;border-radius:3px;display:inline-block}
.dc-d{color:#C62828;font-weight:700;font-family:monospace;font-size:.87em}
.dc-c{color:#2E7D32;font-weight:700;font-family:monospace;font-size:.87em}
.amt{font-family:monospace;font-size:.85em}
.amt.bold{font-weight:700}
.missing{color:#dc2626}
.link-cell{color:#1a365d;text-decoration:underline;text-decoration-color:#cbd5e1;cursor:pointer}
.err-row td{font-size:.78em;color:#C62828;font-style:italic;border-bottom:1px solid #fecaca;padding:3px 9px 7px}
.muted{color:#94a3b8}
.mono{font-family:monospace}

/* Row tinting */
.row-error{background:#FFF5F5}
.row-manual_review{background:#FFFDE7}
.row-ready{background:#F1F8E9}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:5px;border:1px solid #cbd5e1;background:#fff;color:#334155;font-weight:600;font-size:.83em;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .12s}
.btn:hover:not(:disabled){filter:brightness(.97)}
.btn:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed;border-color:#e2e8f0}
.btn.primary{background:#1a365d;color:#fff;border:none}
.btn.danger{background:#dc2626;color:#fff;border:none}
.btn.sm{padding:5px 11px;font-size:.77em}
.btn .ic{font-size:1.05em}

/* Pagination */
.pagination{padding:8px 22px;background:#fff;border-top:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;font-size:.8em;color:#64748b}
.pagination select{font-size:.88em;padding:1px 5px;border:1px solid #e2e8f0;border-radius:3px}
.pg-btn{border:1px solid #e2e8f0;background:#fff;border-radius:3px;padding:1px 7px;color:#94a3b8;cursor:pointer}

/* Card wrapper for secondary views */
.card{background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;margin:0}
.card-bar{padding:9px 14px;border-bottom:1px solid #e2e8f0;display:flex;gap:7px;align-items:center}
.card-info{padding:9px 14px;border-bottom:1px solid #e2e8f0;font-size:.8em;color:#64748b;font-style:italic}
.card-body{overflow:auto}

/* Overlay / dialogs */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.48);backdrop-filter:blur(3px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.dialog{background:#fff;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.18);max-width:700px;width:100%;max-height:84vh;overflow:auto}
.dlg-hdr{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.dlg-hdr h3{margin:0;font-size:.98em;font-weight:600;display:flex;align-items:center;gap:8px}
.dlg-close{background:none;border:none;font-size:17px;color:#94a3b8;cursor:pointer}
.dlg-body{padding:20px}
.dlg-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:16px}
.info-box{background:#f8fafc;border-radius:6px;padding:12px;margin-bottom:14px;font-size:.86em}
.info-row{display:flex;gap:16px;flex-wrap:wrap}
.info-row span.lbl{color:#64748b}

/* Slide-over form panel */
.slide-over{position:fixed;inset:0;z-index:900;display:flex}
.slide-bg{flex:1;background:rgba(15,23,42,.3);backdrop-filter:blur(2px);cursor:pointer}
.slide-panel{width:580px;background:#fff;box-shadow:-6px 0 36px rgba(0,0,0,.1);overflow:auto;animation:si .2s ease}
.slide-hdr{padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;background:#f8fafc;position:sticky;top:0;z-index:2}
.slide-hdr .meta{font-size:.74em;color:#64748b}
.slide-hdr h2{margin:1px 0 0;font-size:.96em;font-weight:700}
.slide-body{padding:0 20px 18px}
.slide-footer{padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;gap:7px;justify-content:space-between;background:#f8fafc;position:sticky;bottom:0;z-index:2}

/* Form sections */
.f-section{margin-top:14px}
.f-section-hdr{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;border-bottom:2px solid #e2e8f0;padding:7px 0 5px;cursor:pointer;text-align:left;font-family:inherit}
.f-section-hdr .num{font-size:.68em;color:#94a3b8;font-weight:700;background:#f1f5f9;padding:1px 5px;border-radius:3px}
.f-section-hdr .title{font-size:.86em;font-weight:700;color:#1e293b;flex:1}
.f-section-hdr .toggle{color:#94a3b8;font-size:.8em}
.f-section-body{padding:8px 0 2px}
.f-row{display:flex;gap:12px;margin-bottom:7px;flex-wrap:wrap}
.f-field{flex:1 1 28%;min-width:110px}
.f-field.wide{flex:1 1 100%;min-width:200px}
.f-field label{display:block;font-size:.68em;color:#64748b;font-weight:600;margin-bottom:2px}
.f-field .val{font-size:.86em;padding:4px 0}
.f-field .val.muted{color:#94a3b8}
.f-field input[type=text],.f-field select,.f-field textarea{width:100%;font-size:.86em;padding:4px 7px;border:1px solid #e2e8f0;border-radius:4px;font-family:inherit}
.f-field input.highlight{border:2px solid #f59e0b;background:#FFFDE7}
.f-field .err-val{font-size:.83em;color:#C62828;padding:5px 8px;background:#FFF5F5;border-radius:4px;border:1px solid #fecaca}

/* Toast */
.toast{position:fixed;top:16px;right:16px;background:#1a365d;color:#fff;padding:10px 20px;border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.22);z-index:9999;font-size:.86em;display:flex;align-items:center;gap:9px;animation:fi .25s ease}
.toast .check{color:#6ee7b7}
.toast button{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:14px;margin-left:8px}

.placeholder{padding:36px;text-align:center;color:#94a3b8}
.placeholder .big-icon{font-size:42px;margin-bottom:10px}
.hidden{display:none}

/* Grid for dialog forms */
.dlg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-bottom:16px}
.dlg-grid .span2{grid-column:span 2}
.dlg-grid label{display:block;font-size:.72em;color:#64748b;font-weight:600;margin-bottom:2px}
.dlg-grid input,.dlg-grid select,.dlg-grid textarea{width:100%;font-size:.86em;padding:4px 7px;border:1px solid #e2e8f0;border-radius:4px;font-family:inherit}
.dlg-grid textarea{height:70px;resize:vertical}

.recon-note{font-size:.8em;color:#64748b;margin-bottom:18px;font-style:italic}
.green{color:#16a34a;font-weight:600}
.red{color:#dc2626;font-weight:600}
.split-sum{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;background:#f8fafc;border-radius:6px;font-size:.82em;margin-bottom:14px}
.add-row-btn{font-size:.8em;color:#3b82f6;background:none;border:none;cursor:pointer;margin-bottom:14px;font-family:inherit}

input[type=checkbox]{width:15px;height:15px;accent-color:#1a365d;cursor:pointer}
</style>
</head>

const SM_={new:{b:"#E3F2FD",f:"#1565C0"},processing:{b:"#FFF3E0",f:"#E65100"},enriched:{b:"#E8F5E9",f:"#2E7D32"},error:{b:"#FFEBEE",f:"#C62828"},manual_review:{b:"#FFF8E1",f:"#F57F17"},in_review:{b:"#F3E5F5",f:"#6A1B9A"},adjusted:{b:"#E0F2F1",f:"#00695C"},ready:{b:"#C8E6C9",f:"#1B5E20"},paired:{b:"#E8EAF6",f:"#283593"},superseded:{b:"#F5F5F5",f:"#9E9E9E"},confirmed:{b:"#E8F5E9",f:"#1B5E20"},pending:{b:"#E3F2FD",f:"#1565C0"},posted:{b:"#C8E6C9",f:"#1B5E20"},revoked:{b:"#F5F5F5",f:"#9E9E9E"}};
const CM_={rule_match:{b:"#E8F5E9",f:"#2E7D32"},tentative:{b:"#FFF8E1",f:"#F57F17"},unclassified:{b:"#FFEBEE",f:"#C62828"},manual_override:{b:"#E0F2F1",f:"#00695C"}};

function fmt(v){return v!=null&&v!==0?Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):""}
function trc(s,n){n=n||52;return s&&s.length>n?s.slice(0,n)+"...":s}
function stBadge(v){const c=SM_[v]||{b:"#f1f5f9",f:"#64748b"};const cl=(v==="error"||v==="ready"?" bold":"")+(v==="superseded"||v==="revoked"?" strike":"");return `<span class="st-badge${cl}" style="background:${c.b};color:${c.f}">${(v||"—").replace(/_/g," ")}</span>`;}
function confBadge(v){const c=CM_[v]||{b:"#f1f5f9",f:"#64748b"};return `<span class="conf-badge" style="background:${c.b};color:${c.f}">${(v||"—").replace(/_/g," ")}</span>`;}
function originBadge(v){const c=v==="split"?{b:"#F3E5F5",f:"#6A1B9A"}:v==="merge"?{b:"#E0F2F1",f:"#00695C"}:{b:"#f1f5f9",f:"#64748b"};return `<span class="origin-badge" style="background:${c.b};color:${c.f}">${v}</span>`;}
function srcBadge(v){const c=v==="S"?{b:"#E3F2FD",f:"#1565C0"}:v==="B"?{b:"#F3E5F5",f:"#6A1B9A"}:{b:"#E0F2F1",f:"#00695C"};return `<span class="src-badge" style="background:${c.b};color:${c.f}">${v}</span>`;}
function dcHtml(v){return `<span class="${v==="D"?"dc-d":"dc-c"}">${v}</span>`;}
function amtHtml(v,bold){return `<span class="amt${bold?" bold":""}">${fmt(v)}</span>`;}
function isEditable(st){return["enriched","error","manual_review","in_review","adjusted","paired"].includes(st);}

let currentMenu="workspace";
let wsSel=new Set();
let pqSel=new Set();
let stmFilter=null;

// ─── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg){
  const c=document.getElementById("toast-container");
  c.innerHTML=`<div class="toast"><span class="check">✓</span>${msg}<button onclick="this.parentElement.remove()">×</button></div>`;
  setTimeout(()=>c.innerHTML="",4500);
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────
document.querySelectorAll(".sb-item").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const m=btn.dataset.menu;
    if(!m)return;
    currentMenu=m;
    wsSel=new Set();pqSel=new Set();
    closeSlide();closeOverlay();
    document.querySelectorAll(".sb-item").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const titles={workspace:"Enrichment Workspace",ready:"Ready for Posting",queue:"Posting Queue",posted:"Posted Operations",history:"Split/Merge History",stm:"Statements",mdm:"Master Data"};
    document.getElementById("page-title").textContent=titles[m]||"GAM";
    render();
  });
});
document.getElementById("stm-clear").addEventListener("click",()=>{stmFilter=null;render();});

function render(){
  const sf=document.getElementById("stm-filter");
  if(stmFilter){sf.classList.remove("hidden");document.getElementById("stm-filter-val").textContent=stmFilter;}else{sf.classList.add("hidden");}
  const c=document.getElementById("content");
  if(currentMenu==="workspace")renderWorkspace(c);
  else if(currentMenu==="ready")renderReady(c);
  else if(currentMenu==="queue")renderQueue(c);
  else if(currentMenu==="posted")renderPosted(c);
  else if(currentMenu==="history")renderHistory(c);
  else if(currentMenu==="stm")c.innerHTML=`<div class="placeholder"><div class="big-icon">📁</div><p>Statements list — each row links to Enrichment Workspace via "Open Enrichment Workspace →" button</p></div>`;
  else if(currentMenu==="mdm")c.innerHTML=`<div class="placeholder"><div class="big-icon">⚙</div><p>Master Data: Customers, Assets, Counterparties, FX Rates, Transaction Types</p></div>`;
}

// ─── WORKSPACE ─────────────────────────────────────────────────────────────
function renderWorkspace(c){
  const sr=WS.filter(r=>wsSel.has(r.id));
  let h="";

  // Summary
  if(!stmFilter){
    h+=`<div class="summary"><div class="summary-title">Statement Overview</div><table><thead><tr>
    <th style="text-align:left">Statement</th><th class="r">Records</th><th class="r">New</th><th class="r">Working</th><th class="r">Ready</th><th class="r">Confirmed</th><th class="r">Errors</th>
    </tr></thead><tbody>`;
    STMTS.forEach(s=>{h+=`<tr class="clickable" onclick="stmFilter='${s.id}';render()">
      <td><span style="color:#1a365d;font-weight:600">${s.ref}</span> <span class="muted" style="font-size:.76em">${s.id}</span></td>
      <td class="r" style="font-weight:600">${s.total}</td>
      <td class="r"><span style="color:${s.new_c>0?"#1565C0":"#94a3b8"}">${s.new_c}</span></td>
      <td class="r"><span style="color:${s.work>0?"#6A1B9A":"#94a3b8"}">${s.work}</span></td>
      <td class="r"><span style="color:${s.ready>0?"#1B5E20":"#94a3b8"};font-weight:${s.ready>0?600:400}">${s.ready}</span></td>
      <td class="r"><span style="color:${s.conf>0?"#2E7D32":"#94a3b8"}">${s.conf}</span></td>
      <td class="r"><span style="color:${s.err>0?"#C62828":"#94a3b8"};font-weight:${s.err>0?700:400}">${s.err>0?"⚠ "+s.err:s.err}</span></td>
    </tr>`;});
    h+=`</tbody></table><div class="summary-hint">Click a statement row to filter the workspace below</div></div>`;
  }

  // Toolbar
  const canConf=sr.some(r=>r.st==="ready");
  const canReady=sr.some(r=>["enriched","adjusted","in_review","paired"].includes(r.st));
  const canSplit=sr.length===1&&["enriched","adjusted","in_review","ready"].includes(sr[0]?.st);
  const canMerge=sr.length>=2&&sr.every(r=>["enriched","adjusted","in_review"].includes(r.st));
  const canReproc=sr.some(r=>["error","manual_review"].includes(r.st));
  const canDel=sr.some(r=>["new","error","manual_review"].includes(r.st));

  h+=`<div class="toolbar">
    <button class="btn primary sm" ${canConf?"":"disabled"} onclick="openConfirmDlg()"><span class="ic">✓</span> Confirm for Posting</button>
    <button class="btn sm" ${canReady?"":"disabled"} onclick="showToast('Records marked as ready');wsSel=new Set();render()"><span class="ic">→</span> Mark as Ready</button>
    <div class="sep"></div>
    <button class="btn sm" ${canSplit?"":"disabled"} onclick="openSplitDlg()"><span class="ic">⑂</span> Split</button>
    <button class="btn sm" ${canMerge?"":"disabled"} onclick="openMergeDlg()"><span class="ic">⊕</span> Merge</button>
    <div class="sep"></div>
    <button class="btn sm" ${canReproc?"":"disabled"} onclick="showToast('Records reset for reprocessing');wsSel=new Set();render()"><span class="ic">↻</span> Reprocess</button>
    <button class="btn danger sm" ${canDel?"":"disabled"} onclick="openDeleteDlg()"><span class="ic">×</span> Delete</button>
    <div class="spacer"></div>
    <button class="btn sm" onclick="openManualDlg()"><span class="ic">＋</span> New Manual Entry</button>
    ${wsSel.size>0?`<span class="sel-info">${wsSel.size} selected</span>`:""}
  </div>`;

  // Filters
  h+=`<div class="filters"><label>FILTERS</label>
    <select><option>All Statuses</option>${["enriched","error","manual_review","in_review","adjusted","ready","paired"].map(s=>`<option>${s.replace(/_/g," ")}</option>`).join("")}</select>
    <select><option>All Sources</option><option>Bank (B)</option><option>Securities (S)</option><option>Manual (M)</option></select>
    <select><option>All Types</option>${["SEC_BUY","SEC_SELL","BOND_BUY","BOND_COUPON","DIV_INCOME","CASH_IN_OUT","FX_EXCHANGE","COMMISSION"].map(t=>`<option>${t}</option>`).join("")}</select>
    <input placeholder="Customer..."><input placeholder="Search description..." style="width:140px">
  </div>`;

  // Table
  const allChecked=wsSel.size===WS.length&&WS.length>0;
  h+=`<div style="flex:1;overflow:auto"><table style="min-width:1180px"><thead><tr>
    <th style="width:34px"><input type="checkbox" ${allChecked?"checked":""} onchange="toggleAllWs()"></th>
    <th style="width:86px">Status</th><th style="width:38px">Src</th><th style="width:80px">Date</th><th style="width:92px">Type</th><th>Description</th><th class="c" style="width:34px">D/C</th><th class="r" style="width:92px">Amount</th><th class="r" style="width:72px">Fee</th><th class="r" style="width:96px">Total</th><th style="width:36px">Ccy</th><th style="width:74px">Customer</th><th style="width:56px">Asset</th><th style="width:38px">CP</th><th style="width:52px">Origin</th><th style="width:74px">Conf.</th>
  </tr></thead><tbody>`;

  WS.forEach(r=>{
    const bg=r.st==="error"?"row-error":r.st==="manual_review"?"row-manual_review":r.st==="ready"?"row-ready":"";
    h+=`<tr class="${bg} clickable">
      <td><input type="checkbox" ${wsSel.has(r.id)?"checked":""} onchange="toggleWsSel('${r.id}')"></td>
      <td>${stBadge(r.st)}</td>
      <td>${srcBadge(r.s)}</td>
      <td style="font-size:.82em;color:#475569">${r.dt}</td>
      <td style="font-size:.82em;font-weight:600">${r.ty||'<span class="missing" style="font-style:italic">—</span>'}</td>
      <td style="font-size:.82em"><span class="link-cell" onclick="openForm('${r.id}')">${trc(r.de)}</span></td>
      <td class="c">${dcHtml(r.dc)}</td>
      <td class="r">${amtHtml(r.am)}</td>
      <td class="r">${amtHtml(r.fe)}</td>
      <td class="r">${amtHtml(r.to,true)}</td>
      <td style="font-size:.8em;font-weight:600">${r.cy}</td>
      <td style="font-size:.8em">${r.cu||'<span class="missing">⚠ missing</span>'}</td>
      <td style="font-size:.8em">${r.as||"—"}</td>
      <td style="font-size:.8em">${r.cp||"—"}</td>
      <td style="font-size:.76em">${r.or}</td>
      <td>${confBadge(r.co)}</td>
    </tr>`;
    if(r.st==="error"&&r.er){h+=`<tr class="row-error err-row"><td></td><td colspan="15">⚠ ${r.er}</td></tr>`;}
  });
  h+=`</tbody></table></div>`;

  // Pagination
  h+=`<div class="pagination"><div>Showing 1–${WS.length} of ${WS.length}</div><div style="display:flex;align-items:center;gap:7px">Page size: <select class="pg-sel"><option>20</option><option>10</option><option>50</option></select> Page 1 of 1 <button class="pg-btn" disabled>‹</button><button class="pg-btn" disabled>›</button></div></div>`;

  c.innerHTML=`<div style="display:flex;flex-direction:column;height:100%">${h}</div>`;
}

function toggleWsSel(id){if(wsSel.has(id))wsSel.delete(id);else wsSel.add(id);render();}
function toggleAllWs(){if(wsSel.size===WS.length)wsSel=new Set();else wsSel=new Set(WS.map(r=>r.id));render();}

// ─── READY FOR POSTING ─────────────────────────────────────────────────────

  const data=WS.filter(r=>r.st==="ready");
  const allCk=wsSel.size===data.length&&data.length>0;
  let h=`<div class="card"><div class="card-bar">
    <button class="btn primary sm" ${wsSel.size===0?"disabled":""} onclick="openConfirmDlg()"><span class="ic">✓</span> Confirm for Posting</button>
    <button class="btn sm" ${wsSel.size===0?"disabled":""} onclick="showToast('Returned to workspace');wsSel=new Set();render()">Return to Workspace</button>

function toggleAllRdy(){const d=WS.filter(r=>r.st==="ready");if(wsSel.size===d.length)wsSel=new Set();else wsSel=new Set(d.map(r=>r.id));render();}

  const allCk=pqSel.size===PQ.length&&PQ.length>0;
  let h=`<div class="card"><div class="card-bar">
    <button class="btn danger sm" ${pqSel.size===0?"disabled":""} onclick="openRevokeDlg()"><span class="ic">↩</span> Revoke</button>
    <button class="btn sm" ${!PQ.some(r=>pqSel.has(r.id)&&r.st==="error")?"disabled":""} onclick="showToast('Error records reset for retry');pqSel=new Set();render()"><span class="ic">↻</span> Retry</button>

function togglePqSel(id){if(pqSel.has(id))pqSel.delete(id);else pqSel.add(id);render();}
function toggleAllPq(){if(pqSel.size===PQ.length)pqSel=new Set();else pqSel=new Set(PQ.map(r=>r.id));render();}

function closeOverlay(){document.getElementById("overlay-container").innerHTML="";}
function closeSlide(){document.getElementById("slide-container").innerHTML="";}

    <tr><td style="font-weight:600">USD</td><td class="r">${amtHtml(273817.5)}</td><td class="r">${amtHtml(162305)}</td><td class="r">${amtHtml(111512.5)}</td><td class="r"><span class="green">0.00 ✓</span></td></tr></tbody></table>

  document.getElementById("overlay-container").innerHTML=dlgWrap("Confirm for Posting — Reconciliation","✓",body);

function openSplitDlg(){
  const r=WS.find(r=>wsSel.has(r.id));if(!r)return;
  const a1=Math.round(r.am*.6*100)/100,a2=Math.round(r.am*.4*100)/100;
  const f1=Math.round(r.fe*.6*100)/100,f2=Math.round(r.fe*.4*100)/100;
  const body=`
    <div class="info-box"><div class="info-row"><div><span class="lbl">Source:</span> <strong>${r.id}</strong></div><div><span class="lbl">Type:</span> <strong>${r.ty}</strong></div><div><span class="lbl">Asset:</span> <strong>${r.as}</strong></div><div><span class="lbl">Amount:</span> <strong>${fmt(r.am)}</strong> ${r.cy}</div></div></div>
    <div style="font-size:.8em;font-weight:700;margin-bottom:8px">Allocations:</div>
    <table><thead><tr><th style="text-align:left;width:28px">#</th><th style="text-align:left">Customer</th><th class="r">Amount</th><th class="r">Fee</th><th class="r">Total</th></tr></thead>
    <tbody><tr><td>1</td><td><select style="width:100%;font-size:.88em;padding:3px 7px;border:1px solid #e2e8f0;border-radius:4px"><option>CUST001</option><option>CUST002</option><option>CUST003</option></select></td><td class="r"><input value="${fmt(a1)}" style="width:95px;text-align:right;font-size:.86em;padding:3px 7px;border:1px solid #e2e8f0;border-radius:4px;font-family:monospace" readonly></td><td class="r"><input value="${fmt(f1)}" style="width:75px;text-align:right;font-size:.86em;padding:3px 7px;border:1px solid #e2e8f0;border-radius:4px;font-family:monospace" readonly></td><td class="r amt bold">${fmt(a1+f1)}</td></tr>
    <tr><td>2</td><td><select style="width:100%;font-size:.88em;padding:3px 7px;border:1px solid #e2e8f0;border-radius:4px"><option>CUST002</option><option>CUST001</option><option>CUST003</option></select></td><td class="r"><input value="${fmt(a2)}" style="width:95px;text-align:right;font-size:.86em;padding:3px 7px;border:1px solid #e2e8f0;border-radius:4px;font-family:monospace" readonly></td><td class="r"><input value="${fmt(f2)}" style="width:75px;text-align:right;font-size:.86em;padding:3px 7px;border:1px solid #e2e8f0;border-radius:4px;font-family:monospace" readonly></td><td class="r amt bold">${fmt(a2+f2)}</td></tr></tbody></table>
    <div class="split-sum"><div style="display:flex;gap:14px"><span>Sum: <strong>${fmt(r.am)}</strong></span><span>Fee Sum: <strong>${fmt(r.fe)}</strong></span></div><span class="green">Remaining: 0.00 ✓</span></div>
    <button class="add-row-btn">+ Add Row</button>
    <div class="dlg-actions"><button class="btn primary" onclick="closeOverlay();closeSlide();showToast('Split complete: 2 records created from ${r.id}');wsSel=new Set();render()">Confirm Split</button><button class="btn" onclick="closeOverlay()">Cancel</button></div>`;
  document.getElementById("overlay-container").innerHTML=dlgWrap("Split Transaction","⑂",body);
}

function openMergeDlg(){
  const sr=WS.filter(r=>wsSel.has(r.id));if(sr.length<2)return;
  let rows="";sr.forEach(r=>{rows+=`<tr><td class="mono" style="font-size:.82em">${r.id}</td><td style="font-weight:600;font-size:.82em">${r.ty}</td><td class="r">${amtHtml(r.am)}</td><td class="r">${amtHtml(r.fe)}</td><td class="r">${amtHtml(r.to,true)}</td></tr>`;});
  const body=`
    <div style="font-size:.82em;font-weight:600;margin-bottom:8px">Merging ${sr.length} records:</div>
    <table><thead><tr><th style="text-align:left">Record</th><th style="text-align:left">Type</th><th class="r">Amount</th><th class="r">Fee</th><th class="r">Total</th></tr></thead>
    <tbody>${rows}<tr style="border-top:2px solid #e2e8f0"><td style="font-weight:700">TOTAL</td><td></td><td class="r">${amtHtml(sr.reduce((s,r)=>s+r.am,0),true)}</td><td class="r">${amtHtml(sr.reduce((s,r)=>s+r.fe,0))}</td><td class="r">${amtHtml(sr.reduce((s,r)=>s+r.to,0),true)}</td></tr></tbody></table>
    <div style="font-size:.8em;font-weight:700;margin:14px 0 8px">Merged Record Fields:</div>
    <div class="dlg-grid">
      <div><label>Internal Type</label><input value="${sr[0].ty}"></div><div><label>Customer</label><input value="${sr[0].cu}"></div>
      <div><label>Asset</label><input value="${sr[0].as}"></div><div><label>Counterparty</label><input value="${sr[0].cp}"></div>
      <div><label>D/C</label><input value="${sr[0].dc}"></div><div><label>Date</label><input value="${sr.reduce((m,r)=>r.dt<m?r.dt:m,sr[0].dt)}"></div>
      <div class="span2"><label>Description</label><input value="Merged: ${sr.length} ${sr[0].ty} orders"></div>
    </div>
    <div class="dlg-actions"><button class="btn primary" onclick="closeOverlay();showToast('${sr.length} records merged into 1');wsSel=new Set();render()">Confirm Merge</button><button class="btn" onclick="closeOverlay()">Cancel</button></div>`;
  document.getElementById("overlay-container").innerHTML=dlgWrap("Merge Transactions","⊕",body);
}

function openRevokeDlg(){
  const sr=PQ.filter(r=>pqSel.has(r.id)&&r.st==="pending");
  let items="";sr.forEach(r=>{items+=`<div style="color:#475569;padding:1px 0">• ${r.id} (${r.ty}, ${r.as||"cash"}, ${fmt(r.to)} ${r.cy})</div>`;});
  const body=`
    <p style="font-size:.86em;color:#475569;margin:0 0 10px">Revoking <strong>${sr.length}</strong> posting operations. Returns linked records to editable status.</p>
    <div class="info-box"><div style="font-weight:600;margin-bottom:5px">Affected records:</div>${items}</div>
    <div class="dlg-grid"><div class="span2"><label>Reason for revocation *</label><textarea placeholder="Describe why..."></textarea></div></div>
    <div class="dlg-actions"><button class="btn danger" onclick="closeOverlay();showToast('Posting operations revoked');pqSel=new Set();render()">Revoke</button><button class="btn" onclick="closeOverlay()">Cancel</button></div>`;
  document.getElementById("overlay-container").innerHTML=dlgWrap("Revoke Posting Operation","↩",body);
}

function openDeleteDlg(){
  const sr=WS.filter(r=>wsSel.has(r.id)&&["new","error","manual_review"].includes(r.st));
  const body=`<p style="font-size:.86em;color:#475569">Delete <strong>${sr.length}</strong> selected records? This cannot be undone.</p>
    <div class="dlg-actions"><button class="btn danger" onclick="closeOverlay();showToast('Records deleted');wsSel=new Set();render()">Delete</button><button class="btn" onclick="closeOverlay()">Cancel</button></div>`;
  document.getElementById("overlay-container").innerHTML=dlgWrap("Delete Records","×",body);
}

function openManualDlg(){
  const body=`<div class="dlg-grid">
    <div class="span2"><label>Statement *</label><select><option>STM-2024-07 (LHV Jul 2024)</option><option>STM-2024-06</option></select></div>
    <div><label>Type *</label><select><option>CASH_IN_OUT</option><option>SEC_BUY</option><option>SEC_SELL</option><option>COMMISSION</option></select></div>
    <div><label>Date *</label><input type="date" value="2024-07-25"></div>
    <div><label>D/C *</label><select><option>C (Credit)</option><option>D (Debit)</option></select></div>
    <div><label>Amount *</label><input placeholder="0.00" style="font-family:monospace"></div>
    <div><label>Currency *</label><input value="EUR"></div>
    <div><label>Customer *</label><select><option>CUST001</option><option>CUST002</option><option>CUST003</option></select></div>
    <div class="span2"><label>Description *</label><input placeholder="Manual adj: reason..."></div>
  </div>
  <div class="dlg-actions"><button class="btn primary" onclick="closeOverlay();showToast('Manual record created')">Create</button><button class="btn" onclick="closeOverlay()">Cancel</button></div>`;
  document.getElementById("overlay-container").innerHTML=dlgWrap("New Manual Enrichment Record","＋",body);
}

// ─── FORM SLIDE-OVER ───────────────────────────────────────────────────────
function openForm(id){
  const r=WS.find(x=>x.id===id);if(!r)return;
  const ed=isEditable(r.st);
  function fld(label,val,opts){
    opts=opts||{};
    const cls=opts.wide?"f-field wide":"f-field";
    let inner;
    if(opts.badge){const c=SM_[val]||CM_[val]||{b:"#f1f5f9",f:"#64748b"};inner=`<span class="st-badge" style="background:${c.b};color:${c.f}">${(val||"").replace(/_/g," ")}</span>`;}
    else if(opts.dc){inner=`<span class="${val==="D"?"dc-d":"dc-c"}">${val==="D"?"D (Debit)":"C (Credit)"}</span>`;}
    else if(opts.err){inner=`<div class="err-val">${val}</div>`;}
    else if(opts.editable){inner=`<input type="text" value="${val||""}" placeholder="${opts.ph||""}" class="${opts.highlight?"highlight":""}${opts.mono?" mono":""}" style="${opts.mono?"font-family:monospace;":""}">`;}
    else{inner=`<div class="val${opts.muted?" muted":""}${opts.mono?" mono":""}" style="${opts.bold?"font-weight:700;":""}">${val||"—"}</div>`;}
    return `<div class="${cls}"><label>${label}</label>${inner}</div>`;
  }
  function sec(title,n,content,show){
    if(show===false)return"";
    return `<div class="f-section"><button class="f-section-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.toggle').textContent=this.nextElementSibling.style.display==='none'?'▸':'▾'"><span class="num">§${n}</span><span class="title">${title}</span><span class="toggle">▾</span></button><div class="f-section-body">${content}</div></div>`;
  }

  let body="";
  body+=sec("Traceability","1",`<div class="f-row">${fld("Source Type",r.s==="S"?"Securities":r.s==="B"?"Bank":"Manual")}${fld("Source Trx ID",r.id+"-src",{muted:true})}${fld("Statement","STM-2024-07",{muted:true})}</div>`);
  body+=sec("Lineage","2",`<div class="f-row">${fld("Origin",r.or)}${fld("Parent ID","ENR-050",{muted:true})}${fld("Group","a3f8b2c1",{muted:true})}${fld("Seq","1",{muted:true})}</div><div class="f-row">${fld("Lineage Note","Split from ENR-050: allocation to "+r.cu,{wide:true})}</div>`,r.or!=="pipeline");
  body+=sec("Transaction","3",`<div class="f-row">${fld("Transaction Date",r.dt,{editable:ed})}${fld("Settlement Date","2024-07-04",{editable:ed})}${fld("D/C",r.dc,{dc:true})}</div><div class="f-row">${fld("Amount",fmt(r.am),{mono:true,editable:ed})}${fld("Fee",fmt(r.fe),{mono:true,editable:ed})}${fld("Total",fmt(r.to),{mono:true,bold:true})}</div><div class="f-row">${fld("Source Currency",r.cy,{editable:ed})}</div><div class="f-row">${fld("Description",r.de,{wide:true,editable:ed})}</div>`);
  body+=sec("Classification","4",`<div class="f-row">${fld("Internal Type",r.ty||"—",{editable:ed,highlight:!r.ty})}${fld("Confidence",r.co,{badge:true})}${fld("Matched Rule","R-SEC-001",{muted:true})}</div>`);
  body+=sec("Currency & FX","5",`<div class="f-row">${fld("Validated Currency",r.cy)}${fld("FX Rate to EUR",r.cy==="EUR"?"1.0000":"1.0892",{mono:true,editable:r.cy!=="EUR"&&ed})}${fld("Rate Date","2024-07-02")}</div><div class="f-row">${fld("Rate Source",r.cy==="EUR"?"—":"ECB")}${fld("EUR Amount",fmt(r.cy==="EUR"?r.to:r.to/1.0892),{mono:true})}${fld("EUR Parallel","No")}</div>`);
  body+=sec("Resolved Entities","6",`<div class="f-row">${fld("Customer ID",r.cu?"cid-"+r.cu:"",{editable:ed,highlight:!r.cu})}${fld("Customer Code",r.cu,{editable:ed,highlight:!r.cu})}${fld("Match Method",r.cu?"isin_lookup":"—",{muted:true})}</div><div class="f-row">${fld("Asset ID",r.as?"aid-"+r.as:"",{editable:ed})}${fld("ISIN",r.as?"US0000"+r.as:"")}${fld("Asset Category",r.as?"equity":"")}</div><div class="f-row">${fld("Counterparty ID",r.cp?"cpid-"+r.cp:"",{editable:ed})}${fld("CP Code",r.cp)}${fld("CP Source",r.cp?"config":"—",{muted:true})}</div>`);
  if(r.fe>0||r.st==="paired")body+=sec("Fee & Pairing","7",`<div class="f-row">${fld("Has Fee",r.fe>0?"Y":"N")}${fld("Fee Trx ID",r.fe>0?"ENR-xxx-fee":"—",{muted:true})}${fld("Pair ID",r.st==="paired"?"PAIR-001":"—",{muted:true})}</div>`);
  let s8=`<div class="f-row">${fld("Status",r.st,{badge:true})}${fld("Enrichment Time","2024-07-28 09:15:32",{muted:true})}${fld("Version","1",{muted:true})}</div>`;
  if(r.st==="error"&&r.er)s8+=`<div class="f-row">${fld("Error Message",r.er,{wide:true,err:true})}</div>`;
  s8+=`<div class="f-row">${fld("Processing Notes","",{wide:true,editable:ed,ph:"Add notes about this record..."})}</div>`;
  body+=sec("Status & Notes","8",s8);

  // Buttons
  let leftBtns="";
  if(ed)leftBtns+=`<button class="btn primary" onclick="closeSlide();showToast('Record saved')">Save</button>`;
  leftBtns+=`<button class="btn" onclick="closeSlide()">Close</button>`;
  let rightBtns="";
  if(["enriched","adjusted","in_review","paired"].includes(r.st))rightBtns+=`<button class="btn sm" onclick="closeSlide();showToast('Marked as ready')"><span class="ic">→</span> Mark as Ready</button>`;
  if(r.st==="ready")rightBtns+=`<button class="btn sm" onclick="closeSlide();showToast('Returned to editing')"><span class="ic">↩</span> Return to Editing</button>`;
  if(["enriched","adjusted","in_review"].includes(r.st))rightBtns+=`<button class="btn sm" onclick="closeSlide();openSplitFormDlg('${r.id}')"><span class="ic">⑂</span> Split</button>`;

  document.getElementById("slide-container").innerHTML=`<div class="slide-over">
    <div class="slide-bg" onclick="closeSlide()"></div>
    <div class="slide-panel">
      <div class="slide-hdr"><div><div class="meta">Enrichment Record</div><h2>${r.id}</h2></div><div style="display:flex;gap:7px;align-items:center">${stBadge(r.st)}<button class="dlg-close" onclick="closeSlide()">×</button></div></div>
      <div class="slide-body">${body}</div>
      <div class="slide-footer"><div style="display:flex;gap:7px">${leftBtns}</div><div style="display:flex;gap:7px">${rightBtns}</div></div>
    </div>
  </div>`;
}
function openSplitFormDlg(id){wsSel=new Set([id]);openSplitDlg();}

// ─── INIT ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
